<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes | PadhAI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <header>
        <h1>PadhAI</h1>

            </div>

                <a href="/upload">

                </a>

                <a href="/">
                    <button>Home</button>
                </a>

            </div>

        </section>

    </main>

    <footer>
        <p>© 2026 PadhAI | Smart Student Educational Content Generator</p>
    </footer>

</body>

</html>
